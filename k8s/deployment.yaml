apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-app-deployment
  labels:
    app: enterprise-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-app
  template:
    metadata:
      labels:
        app: enterprise-app
    spec:
      containers:
      - name: python-app
        image: python:3.9-slim
        command: ["python", "-m", "http.server", "8000"]
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "100Mi"
            cpu: "50m"
          limits:
            memory: "250Mi"
            cpu: "100m"